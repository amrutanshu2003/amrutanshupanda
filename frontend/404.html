<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Amrutanshu Panda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0b1022;
      --card: rgba(20, 27, 46, 0.8);
      --text: #eff2ff;
      --muted: #b3bddf;
      --accent: #ff7a49;
      --border: rgba(255, 255, 255, 0.16);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Outfit", sans-serif;
      color: var(--text);
      padding: 1rem;
      background:
        radial-gradient(circle at 10% 12%, rgba(255, 122, 73, 0.36), transparent 28%),
        radial-gradient(circle at 90% 80%, rgba(123, 101, 255, 0.26), transparent 30%),
        var(--bg);
    }
    main {
      width: min(700px, 100%);
      border: 1px solid var(--border);
      border-radius: 26px;
      background: var(--card);
      backdrop-filter: blur(9px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      padding: 2rem;
    }
    .top {
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(3.2rem, 12vw, 7rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .top span { color: var(--accent); }
    h1 {
      margin-top: 0.8rem;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.4rem, 3vw, 2rem);
    }
    p {
      margin-top: 0.8rem;
      color: var(--muted);
      max-width: 56ch;
    }
    .actions {
      margin-top: 1.4rem;
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    a {
      text-decoration: none;
      border-radius: 12px;
      padding: 0.74rem 1rem;
      font-weight: 600;
    }
    .primary {
      color: #fff;
      background: linear-gradient(120deg, #ff7a49, #ffa64c);
    }
    .ghost {
      color: var(--text);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
    }
  </style>
</head>
<body>
  <main>
    <p class="top">4<span>0</span>4</p>
    <h1>This page does not exist</h1>
    <p>The URL is invalid or the page was moved. Use the button below to return to your portfolio homepage.</p>
    <div class="actions">
      <a class="primary" href="/">Go Home</a>
      <a class="ghost" href="/#contact">Contact Section</a>
    </div>
  </main>
</body>
</html>
